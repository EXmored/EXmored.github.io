<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EX登入界面</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        /*background-color: pink;*/
        display: flex;
        min-height: 100vh;
        justify-content: center;
        padding: 20px;
        align-items: center;
    }

    @keyframes gradient {
        0% {
            background-position: 0% 50%;
        }
        25% {
            background-position: 100% 50%;
        }
        50% {
            background-position: 0% 50%;
        }
        75%{
            background-position: 100% 50%;
        }
        100%{
            background-position: 0% 50%;
        }
    }

    .container{
        background: white;
        width: 100%;
        max-width: 400px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
    }

    .header {
        background: #4a6bdf;
        color: white;
        padding: 25px 20px;
        text-align: center;
    }
    .header h1{
        font-size: 24px;
        margin-bottom: 5px;
    }

    .header p{
        font-size: 14px;
        opacity: 0.9;
    }

    .form-container{
        padding: 20px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
        transition: border-color 0.3s;
    }

    .input-group input:focus {
        border-color: #4a6bdf;
        outline: none;
        box-shadow: 0 0 0 2px rgba(74, 107, 223, 0.2);
    }

    .btn{
        width: 100%;
        padding: 14px;
        background: #4a6bdf;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn:hover {
        background: #3a5bc9;
    }

    .Register{
        padding-top: 15px;
        text-align: center;
        font-size: 14px;
        color: #666;
    }

    .Register a{
        color: skyblue;
    }

    .footer{
        text-align: center;
        padding: 20px;
        border-top: 1px solid #eee;
        color: #666;
        font-size: 14px;
    }


</style>
<body>
    <div class="container">
        <div class="header">
            <h1>欢迎登入</h1>
            <span>请输入您的账号和密码访问网站内容</span>
        </div>
        <div class="form-container">
            <form method="post" action="login.php" id="loginForm">

                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
               <div class="input-group">
                   <label>密码</label>
                   <input type="password" id="password" name="password" placeholder="请输入密码" required>
               </div>
               <button class="btn" type="submit" name="submit">登入</button>
            </form>
            <div class="Register">
                <label>没有账号?  <a href="register.html">注册</a></label>
            </div>
        </div>
        <div class="footer">
            <p>© EX网站登录系统</p>
        </div>
    </div>
    <script>
        const form = document.getElementById('loginForm');

        // 监听表单提交事件
        form.addEventListener('submit', function(e) {
            // 阻止表单默认提交行为
            e.preventDefault();

            // 清除之前的错误信息
            document.querySelectorAll('.error-message').forEach(el => el.remove());

            // 获取表单数据
            const formData = new FormData(form);

            // 添加提交标识
            formData.append('ajax', 'true');

            // 添加加载状态
            const submitBtn = form.querySelector('.btn');
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = '登录中...';
            submitBtn.disabled = true;

            // 使用Fetch API发送数据到PHP
            fetch('login.php', {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    // 检查响应状态
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    // 处理PHP返回的响应数据
                    if (data.status === 'success') {
                        // 成功时的操作
                        alert(data.message);
                        // 跳转到首页
                        window.location.href = '../index.html';
                    } else {
                        // 失败时的操作 - 显示错误信息
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        errorDiv.textContent = data.message || '登录失败，请重试';
                        errorDiv.style.display = 'block';

                        // 将错误信息插入到表单按钮前
                        form.insertBefore(errorDiv, form.querySelector('.btn'));
                    }
                })
                .catch(error => {
                    console.error('登录失败:', error);
                    alert('请求发送失败，请检查网络连接后重试');
                })
                .finally(() => {
                    // 恢复按钮状态
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
